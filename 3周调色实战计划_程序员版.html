
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; font-family: var(--font-sans); }
.tabs { display: flex; gap: 8px; margin-bottom: 18px; }
.tab { padding: 8px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; transition: all .15s; }
.tab.active { color: #fff; font-weight: 500; border-color: transparent; }
.t1.active { background: #185FA5; }
.t2.active { background: #3B6D11; }
.t3.active { background: #854F0B; }
.phase-panel { display: none; }
.phase-panel.active { display: block; }
.ph-head { border-radius: var(--border-radius-lg); padding: 14px 18px; margin-bottom: 14px; }
.ph-head h2 { font-size: 16px; font-weight: 500; color: #fff; margin-bottom: 3px; }
.ph-head p { font-size: 12px; color: rgba(255,255,255,.78); }
.h1 { background: #185FA5; }
.h2 { background: #3B6D11; }
.h3 { background: #854F0B; }
.days { display: flex; flex-direction: column; gap: 7px; }
.dc { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
.dc-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
.dc-top:hover { background: var(--color-background-secondary); }
.badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.bd1 { background: #E6F1FB; color: #185FA5; }
.bd2 { background: #EAF3DE; color: #3B6D11; }
.bd3 { background: #FAEEDA; color: #854F0B; }
.dc-info { flex: 1; }
.dc-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.dc-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.chev { font-size: 10px; color: var(--color-text-tertiary); transition: transform .18s; }
.dc.open .chev { transform: rotate(90deg); }
.dc-body { display: none; padding: 0 14px 14px; border-top: 0.5px solid var(--color-border-tertiary); }
.dc.open .dc-body { display: block; }
.row { display: flex; gap: 8px; margin-top: 10px; align-items: flex-start; }
.lbl { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .05em; min-width: 40px; padding-top: 1px; flex-shrink: 0; }
.val { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-right: 4px; margin-top: 3px; }
.tag-out { background: var(--color-background-warning); color: var(--color-text-warning); }
.tag-tool { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.tag-tip { background: var(--color-background-info); color: var(--color-text-info); }
.diff { display: inline-flex; align-items: center; gap: 3px; margin-left: 8px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-border-secondary); }
.dot.on { background: #EF9F27; }
</style>

<div class="wrap">
  <div class="tabs">
    <button class="tab t1 active" onclick="sw(1)">Week 1 — 精准控色</button>
    <button class="tab t2" onclick="sw(2)">Week 2 — 场景实战</button>
    <button class="tab t3" onclick="sw(3)">Week 3 — 风格输出</button>
  </div>

  <div id="p1" class="phase-panel active">
    <div class="ph-head h1">
      <h2>Week 1 — 精准控色：把工具用到极限</h2>
      <p>每天一个核心工具，直接做对比输出。目标：7天后能精确控制画面的任意一个色彩维度。</p>
    </div>
    <div class="days" id="d1"></div>
  </div>
  <div id="p2" class="phase-panel">
    <div class="ph-head h2">
      <h2>Week 2 — 场景实战：分类型系统出图</h2>
      <p>人像 / 风光 / 建筑 / 夜景 / 视频，每天一个拍摄场景，形成完整的分类调色经验。</p>
    </div>
    <div class="days" id="d2"></div>
  </div>
  <div id="p3" class="phase-panel">
    <div class="ph-head h3">
      <h2>Week 3 — 风格输出：临摹 → 变形 → 自创</h2>
      <p>从大师作品反推参数，打包预设和LUT，最终形成自己的签名色彩风格。</p>
    </div>
    <div class="days" id="d3"></div>
  </div>
</div>

const bc = ['bd1','bd2','bd3'];

[1,2,3].forEach(ph => {
  const c = document.getElementById('d'+ph);
  days[ph].forEach(d => {
    const el = document.createElement('div');
    el.className = 'dc';
    el.innerHTML = `
      <div class="dc-top" onclick="tog(this.parentElement)">
        <div class="badge ${bc[ph-1]}">D${(ph-1)*7+d.day}</div>
        <div class="dc-info">
          <div class="dc-title">${d.title}</div>
          <div class="dc-sub">${d.sub}</div>
        </div>
        <span class="chev">▶</span>
      </div>
      <div class="dc-body">
        <div class="row"><span class="lbl">练习</span><span class="val">${d.practice}</span></div>
        <div class="row"><span class="lbl">产出</span><span class="val">${d.output} <span class="tag tag-out">存档</span></span></div>

function sw(p) {
  [1,2,3].forEach(i => {
    document.getElementById('p'+i).classList.toggle('active', i===p);
    document.querySelectorAll('.tab')[i-1].classList.toggle('active', i===p);
  });
}
function tog(el) { el.classList.toggle('open'); }
